<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <link rel="stylesheet" href="leaflet.min.css"/>
  <script src="leaflet.min.js"></script>
  <style>
    html, body, #map {
      height: 100%;
      margin: 0;
      padding: 0;
      background: #080c14;
    }
    .leaflet-container { background: #080c14 !important; }
  </style>
</head>
<body>
<div id="map"></div>
<script>
  var map = L.map('map', {
    zoomControl: false,
    attributionControl: false
  }).setView([20, 0], 2);

  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    maxZoom: 20,
    subdomains: 'abcd'
  }).addTo(map);

  var userMarker = null;
  var destMarker = null;
  var routeLine = null;
  var straightLine = null;

  var userIcon = L.divIcon({
    className: '',
    html: '<div style="width:14px;height:14px;background:#00F0FF;border:2.5px solid #fff;border-radius:50%;box-shadow:0 0 10px #00F0FF;"></div>',
    iconSize: [14, 14], iconAnchor: [7, 7]
  });
  var destIcon = L.divIcon({
    className: '',
    html: '<div style="width:18px;height:18px;background:#FF007F;border:2.5px solid #fff;border-radius:50%;box-shadow:0 0 12px #FF007F;"></div>',
    iconSize: [18, 18], iconAnchor: [9, 9]
  });

  function updateLocations(userLat, userLng, destLat, destLng, destTitle) {
    var hasUser = (userLat !== null && userLng !== null);
    var hasDest = (destLat !== null && destLng !== null);

    if (hasUser) {
      var up = [userLat, userLng];
      if (!userMarker) { userMarker = L.marker(up, {icon: userIcon}).addTo(map); }
      else { userMarker.setLatLng(up); }
    } else if (userMarker) { map.removeLayer(userMarker); userMarker = null; }

    if (hasDest) {
      var dp = [destLat, destLng];
      if (!destMarker) {
        destMarker = L.marker(dp, {icon: destIcon}).addTo(map);
        if (destTitle) destMarker.bindPopup('<b>' + destTitle + '</b>').openPopup();
      } else {
        destMarker.setLatLng(dp);
        if (destTitle) destMarker.setPopupContent('<b>' + destTitle + '</b>');
      }
    } else if (destMarker) { map.removeLayer(destMarker); destMarker = null; }

    // Straight dashed line fallback if no road route yet
    if (hasUser && hasDest && !routeLine) {
      if (straightLine) map.removeLayer(straightLine);
      straightLine = L.polyline([[userLat, userLng],[destLat, destLng]], {
        color: '#00F0FF', weight: 3, opacity: 0.5, dashArray: '8,8'
      }).addTo(map);
      map.fitBounds([[userLat, userLng],[destLat, destLng]], {padding:[60,60]});
    } else if (hasUser && !hasDest) {
      map.setView([userLat, userLng], 14);
    }
  }

  function drawRoute(pointsJson) {
    if (straightLine) { map.removeLayer(straightLine); straightLine = null; }
    if (routeLine) { map.removeLayer(routeLine); routeLine = null; }
    var pts = JSON.parse(pointsJson);
    if (!pts || pts.length < 2) return;
    routeLine = L.polyline(pts, {color:'#06B6D4', weight:5, opacity:0.9}).addTo(map);
    map.fitBounds(L.latLngBounds(pts), {padding:[60,60]});
  }

  window.addEventListener('load', function() {
    if (window.Android) window.Android.onMapReady();
  });
</script>
</body>
</html>
